      <p class="profile-board__bio">你说你会哭，不是因为在乎.</p>
      <div class="profile-board__social">
        <a class="social-icon" href="https://github.com/bai0131" target="_blank" title="GitHub">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/></svg>
        </a>

        </a>
        <a class="social-icon" href="https://v.douyin.com/jWvV-MOGcW0/?utm_campaign=client_share&app=aweme&utm_medium=ios&tt_from=more&utm_source=more" target="_blank" title="抖音">
          <svg width="20" height="20" viewBox="0 0 448 512" fill="currentColor"><path d="M448 209.9a210.1 210.1 0 01-122.8-39.3V349.4A162.6 162.6 0 11185 188.3V278.2a74.6 74.6 0 1052.2 71.2V0h88a121.2 121.2 0 001.9 22.2A122.2 122.2 0 00381 102.4a121.4 121.4 0 0067 20.1z"/></svg>

    </div>

    <!-- 文章列表视图 -->
    <div id="article-list-view">
      <div class="episodes-header">
        <span class="episodes-count" id="episodesCount">加载中…</span>
        <div class="type-filters" id="typeFilters"></div>
      </div>
      <div id="article-list-content"></div>
    </div>

    <!-- 文章详情视图 -->
    <div id="article-detail-view" style="display:none;">
      <button id="detail-back-btn" class="article-detail-back">← 返回列表</button>
      <div id="article-detail-content"></div>

    <!-- 留言板 -->
    <div id="waline"></div>

    <!-- 页脚 -->
    <footer class="footer">
      <p>© 2026 Bai • Built with Vanilla JS & Markdown • Deployed on GitHub Pages</p>
      <div class="footer-stats">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        总访问量 <span id="site-pv">--</span> 次
      </div>
    </footer>

  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/aplayer/1.10.1/APlayer.min.js"></script>

  <script>
    (function () {
      /* ===========================================================
         DOM 引用
         =========================================================== */
      var themeToggle     = document.getElementById('themeToggle');
      var typeFilters     = document.getElementById('typeFilters');
      var episodesCount   = document.getElementById('episodesCount');
      var walineEl       = document.getElementById('waline');
      var articleListView     = document.getElementById('article-list-view');
      var articleListContent  = document.getElementById('article-list-content');
      var articleDetailView   = document.getElementById('article-detail-view');
      var articleDetailContent = document.getElementById('article-detail-content');
      var detailBackBtn       = document.getElementById('detail-back-btn');
      var profileBoard        = document.getElementById('profileBoard');
      var aboutLink           = document.getElementById('about-link');
      var articleLink         = document.getElementById('article-link');

      /* ===========================================================
         SPA 路由状态
         =========================================================== */
      var currentSPAPage = 'home';
      var walineInstance = null;
      var pendingWalinePath = null;
      var spaHasRendered = false;

      function updateWalinePath(path) {
        if (walineInstance && walineInstance.update) {
          walineInstance.update({ path: path });
        } else {
          pendingWalinePath = path;
        }
      }

      /* ===========================================================
         全局状态
         =========================================================== */
      var allPosts   = [];
      var activeType = 'all';   // 'all' | 'file' | 'gallery' | 'text'

      /* ===========================================================
         暗黑模式
         =========================================================== */
      function initTheme() {
        if (localStorage.getItem('theme') === 'dark') {
          document.body.classList.add('dark');
        }
      }

      themeToggle.addEventListener('click', function () {
        document.body.classList.toggle('dark');
        var isDark = document.body.classList.contains('dark');
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
      });

      initTheme();

      /* ===========================================================
         APlayer 初始化 —— GitHub Release 动态抓取 + 映射表
         =========================================================== */
      var MUSIC_API  = 'https://api.github.com/repos/bai0131/bxl666/releases/tags/music';

      var musicMap = {
        'bgm1':  { title: '那天下雨了',   artist: '周杰伦' },
        'bgm2':  { title: '晴天',         artist: '周杰伦' },
        'bgm3':  { title: '一路向北',     artist: '周杰伦' },
        'bgm4':  { title: '夜曲',         artist: '周杰伦' },
        'bgm5':  { title: '发如雪',       artist: '周杰伦' },
        'bgm6':  { title: '蒲公英的约定', artist: '周杰伦' },
        'bgm7':  { title: '枫',           artist: '周杰伦' },
        'bgm8':  { title: '爱你没差',     artist: '周杰伦' },
        'bgm9':  { title: '我不配',       artist: '周杰伦' },
        'bgm10': { title: '最长的电影',   artist: '周杰伦' },
        'bgm11': { title: '告白气球',     artist: '周杰伦' },
        'bgm12': { title: '反方向的钟',   artist: '周杰伦' }
      };

      function fetchReleaseAssets(apiUrl) {
        return fetch(apiUrl + '?t=' + Date.now(), { cache: 'no-store' })
          .then(function (res) {
            if (!res.ok) throw new Error('Release fetch failed: ' + apiUrl);
            return res.json();
          })
          .then(function (data) {
            return data.assets || [];
          })
          .catch(function (err) {
            console.warn('Release 请求失败:', apiUrl, err);
            return [];
          });
      }

      function buildAudioList(tracks) {
        var now = Date.now();
        var audioList = [];
        for (var n = 0; n < tracks.length; n++) {
          var t = tracks[n];
          audioList.push({
            name: t.name,
            artist: t.artist,
            url: t.musicUrl + '?t=' + now,
            lrc: t.lrcUrl + '?t=' + now,
            cover: t.coverUrl + '?t=' + now
          });
        }
        return audioList;
      }

      function initPlayer(audioList) {
        if (audioList.length === 0) {
          console.warn('未匹配到任何音乐文件');
          return;
        }
        console.log('APlayer audio 数组:', JSON.stringify(audioList, null, 2));
        new APlayer({
          container: document.getElementById('aplayer'),
          fixed: true,
          lrcType: 3,
          autoplay: false,
          order: 'random',
          theme: '#2980b9',
          audio: audioList
        });
      }

      function initMusic() {
        fetchReleaseAssets(MUSIC_API)
          .then(function (musicAssets) {
            var prefixMap = {};
            for (var i = 0; i < musicAssets.length; i++) {
              var m = musicAssets[i];
              var mName = m.name;
              var match = mName.match(/\.(flac|mp3)$/i);
              if (!match) continue;
              var prefix = mName.replace(/\.(flac|mp3)$/i, '');
              var ext = match[1].toLowerCase();
              if (!prefixMap[prefix] || ext === 'mp3') {
                prefixMap[prefix] = m;
              }
            }

            var prefixes = Object.keys(prefixMap).sort();
            var pairs = [];
            for (var p = 0; p < prefixes.length; p++) {
              var prefix = prefixes[p];
              var m = prefixMap[prefix];
              var prefixLower = prefix.toLowerCase();
              var info = musicMap[prefix] || { title: prefix, artist: 'Jay Chou' };
              pairs.push({
                name: info.title,
                artist: info.artist,
                musicUrl: m.browser_download_url,
                lrcUrl: './music/' + prefixLower + '.lrc',
                coverUrl: './music/' + prefix + '.jpg'
              });
            }
            initPlayer(buildAudioList(pairs));
          })
          .catch(function () {
            console.warn('GitHub API 失败，播放器无法加载');
          });
      }

      initMusic();

      /* ===========================================================
         加载 posts.json
         =========================================================== */
      function loadPosts() {
        var xhr = new XMLHttpRequest();
        xhr.open('GET', './posts.json', true);
        xhr.onload = function () {
          if (xhr.status >= 200 && xhr.status < 300) {
            try {
              allPosts = JSON.parse(xhr.responseText);
            } catch (e) {
              showError('JSON 解析失败，请检查 posts.json 格式。');
              return;
            }
            // 按日期倒序排列
            allPosts.sort(function (a, b) {
              return new Date(b.date) - new Date(a.date);
            });
            initTypeFilters();
            if (!spaHasRendered) {
              render();
            }
          } else {
            showError('无法加载 posts.json，请确保文件存在。');
          }
        };
        xhr.onerror = function () {
          showError('网络错误，无法加载数据。');
        };
        xhr.send();
      }

      function showError(msg) {
        articleListContent.innerHTML =
          '<div class="empty-state">' +
          '<div class="empty-state__icon">⚠️</div>' +
          '<p class="empty-state__text">' + msg + '</p>' +
          '</div>';
        console.error(msg);
      }

      function formatDate(dateStr) {
        var d = new Date(dateStr);
        var year = d.getFullYear();
        var month = d.getMonth() + 1;
        var day = d.getDate();
        var weekdays = ['日', '一', '二', '三', '四', '五', '六'];
        var wd = weekdays[d.getDay()];
        return year + '年' + month + '月' + day + '日 · 星期' + wd;
      }

      /* ===========================================================
         类型筛选标签
         =========================================================== */
      function initTypeFilters() {
        var types = ['all', 'software', 'games', 'system'];
        var labels = { all: '全部', software: '💻 软件', games: '🎮 游戏', system: '⚙️ 系统' };

        var html = '';
        for (var i = 0; i < types.length; i++) {
          html +=
            '<button class="type-filter' + (types[i] === activeType ? ' active' : '') +
            '" data-type="' + types[i] + '">' + labels[types[i]] + '</button>';
        }
        typeFilters.innerHTML = html;

        // 绑定点击事件
        typeFilters.querySelectorAll('.type-filter').forEach(function (btn) {
          btn.addEventListener('click', function () {
            activeType = this.getAttribute('data-type');
            typeFilters.querySelectorAll('.type-filter').forEach(function (b) {
              b.classList.remove('active');
            });
            this.classList.add('active');
            render();
          });
        });
      }

      /* ===========================================================
         获取过滤后的帖子
         =========================================================== */
      function getFilteredPosts() {
        if (activeType === 'all') return allPosts;
        return allPosts.filter(function (p) { return p.category === activeType; });
      }

      /* ===========================================================
         整体渲染
         =========================================================== */
      function render() {
        var posts = getFilteredPosts();
        episodesCount.textContent = '📻 ' + posts.length + ' 篇文章';
        console.log('正在渲染的文章:', posts.length, '篇, activeType:', activeType, posts);

        if (posts.length === 0) {
          articleListContent.innerHTML =
            '<div class="empty-state">' +
            '<div class="empty-state__icon">🎙️</div>' +
            '<p class="empty-state__text">暂无该类型的内容</p>' +
            '</div>';
          return;
        }

        var html = '';
        for (var i = 0; i < posts.length; i++) {
          html += buildArticleCard(posts[i]);
        }
        articleListContent.innerHTML = html;
        bindCardClick();
        spaHasRendered = true;
      }

      function buildArticleCard(post) {
        var catLabels = { software: '💻 软件', games: '🎮 游戏', system: '⚙️ 系统' };
        var catLabel = catLabels[post.category] || '';
        var iconMap = { software: '💻', games: '🎮', system: '⚙️' };
        var icon = iconMap[post.category] || '📄';

        return (
          '<article class="article-card" data-post-id="' + esc(post.id) + '">' +
          '  <div class="article-card__icon">' + icon + '</div>' +
          '  <div class="article-card__body">' +
          '    <div class="article-card__top">' +
          '      <span class="article-card__tag">' + catLabel + '</span>' +
          '      <time class="article-card__date">' + esc(formatDate(post.date)) + '</time>' +
          '    </div>' +
          '    <h2 class="article-card__title">' + esc(post.title) + '</h2>' +
          '    <p class="article-card__summary">' + esc(post.summary) + '</p>' +
          '  </div>' +
          '</article>'
        );
      }

      function bindCardClick() {
        articleListContent.querySelectorAll('.article-card').forEach(function (card) {
          card.addEventListener('click', function () {
            var postId = this.getAttribute('data-post-id');
            showArticleDetail(postId);
          });
        });
      }

      function showArticleDetail(postId) {
        var post = null;
        for (var i = 0; i < allPosts.length; i++) {
          if (allPosts[i].id === postId) { post = allPosts[i]; break; }
        }
        if (!post) return;

        articleDetailContent.innerHTML = '<div class="article-detail-loading">加载中…</div>';
        articleListView.style.display = 'none';
        articleDetailView.style.display = '';
        profileBoard.style.display = 'none';
        document.title = post.title + ' | Bai\'s Blog';
        window.scrollTo({ top: 0, behavior: 'instant' });
        updateWalinePath('/?p=' + postId);

        fetchArticleContent(post);
      }

      function fetchArticleContent(post) {
        var mdPath = '/posts/' + post.id + '.md?t=' + new Date().getTime();

        fetch(mdPath)
          .then(function (res) {
            if (!res.ok) throw new Error('no md file');
            return res.text();
          })
          .then(function (text) {
            renderDetailHTML(post, marked.parse(text));
            hljs.highlightAll();
          })
          .catch(function () {
            if (post.content) {
              renderDetailHTML(post, formatMarkdownText(post.content));
              hljs.highlightAll();
            } else {
              var html = buildDetailFallback(post);
              articleDetailContent.innerHTML = html;
              bindDetailGallery();
            }
          });
      }

      function buildDetailFallback(post) {
        var categoryLabels = { software: '💻 软件', games: '🎮 游戏', system: '⚙️ 系统' };
        var catLabel = categoryLabels[post.category] || post.category || '';

        var galleryHTML = '';
        if (post.images && post.images.length > 0) {
          galleryHTML = '<div class="article-detail__gallery">';
          for (var g = 0; g < post.images.length; g++) {
            galleryHTML +=
              '<img class="article-detail__gallery-img" src="' + esc(post.images[g]) +
              '" alt="图片' + (g + 1) + '" loading="lazy" data-full="' + esc(post.images[g]) + '">';
          }
          galleryHTML += '</div>';
        }

        var downloadsHTML = '';
        if (post.downloads && post.downloads.length > 0) {
          downloadsHTML = '<div class="article-detail__downloads-title">📦 下载资源</div><div class="article-detail__downloads">';
          for (var d = 0; d < post.downloads.length; d++) {
            var f = post.downloads[d];
            downloadsHTML +=
              '<a class="article-detail__dl-btn" href="' + esc(f.url) +
              '" target="_blank" rel="noopener noreferrer">' + esc(f.name) + '</a>';
          }
          downloadsHTML += '</div>';
        }

        return (
          '<div class="article-detail">' +
          '  <h1 class="article-detail__title">' + esc(post.title) + '</h1>' +
          '  <div class="article-detail__meta">' +
          '    <span>' + esc(formatDate(post.date)) + '</span>' +
          '    <span class="article-detail__tag">' + catLabel + '</span>' +
          '  </div>' +
          galleryHTML +
          '  <div class="article-detail__body">' + esc(post.summary) + '</div>' +
          downloadsHTML +
          '</div>'
        );
      }

      function renderDetailHTML(post, bodyHTML) {
        var categoryLabels = { software: '💻 软件', games: '🎮 游戏', system: '⚙️ 系统' };
        var catLabel = categoryLabels[post.category] || post.category || '';

        articleDetailContent.innerHTML =
          '<div class="article-detail">' +
          '  <h1 class="article-detail__title">' + esc(post.title) + '</h1>' +
          '  <div class="article-detail__meta">' +
          '    <span>' + esc(formatDate(post.date)) + '</span>' +
          '    <span class="article-detail__tag">' + catLabel + '</span>' +
          '  </div>' +
          '  <div class="article-detail__body">' + bodyHTML + '</div>' +
          '</div>';

        bindDetailGallery();
      }

      function bindDetailGallery() {
        articleDetailContent.querySelectorAll('.article-detail__gallery-img').forEach(function (img) {
          img.addEventListener('click', function (e) {
            e.stopPropagation();
            openLightbox(this.getAttribute('data-full'));
          });
        });
      }

      detailBackBtn.addEventListener('click', function () {
        showArticleList();
      });

      aboutLink.addEventListener('click', function (e) {
        e.preventDefault();
        showAboutPage();
      });

      articleLink.addEventListener('click', function (e) {
        e.preventDefault();
        navigateHome();
      });

      function setNavbarActive(page) {
        var links = document.querySelectorAll('.navbar__link');
        for (var i = 0; i < links.length; i++) {
          links[i].classList.remove('active');
        }
        if (page === 'about') {
          aboutLink.classList.add('active');
        } else {
          articleLink.classList.add('active');
        }
      }

      function showAboutPage() {
        setNavbarActive('about');
        currentSPAPage = 'about';
        history.pushState({ page: 'about' }, '', '/#about');
        document.title = '关于 | Bai\'s Blog';

        articleDetailContent.innerHTML = '<div class="article-detail-loading">加载中…</div>';
        articleListView.style.display = 'none';
        articleDetailView.style.display = '';
        profileBoard.style.display = 'none';
        window.scrollTo({ top: 0, behavior: 'instant' });

        fetch('/posts/about.md?t=' + new Date().getTime())
          .then(function (res) {
            if (!res.ok) throw new Error('about.md not found');
            return res.text();
          })
          .then(function (text) {
            articleDetailContent.innerHTML =
              '<div class="article-detail">' +
              '  <div class="article-detail__body">' + marked.parse(text) + '</div>' +
              '</div>';
            hljs.highlightAll();
          })
          .catch(function () {
            articleDetailContent.innerHTML =
              '<div class="article-detail">' +
              '  <div class="article-detail__body" style="text-align:center;padding:60px 0;color:var(--paper-muted);">' +
              '    关于页面加载失败，请确认 posts/about.md 存在。' +
              '  </div>' +
              '</div>';
          });
      }

      function showArticleList() {
        setNavbarActive('home');
        document.title = 'Bai | Welcome to my digital garden';
        articleDetailView.style.display = 'none';
        articleListView.style.display = '';
        profileBoard.style.display = '';
        articleDetailContent.innerHTML = '';
        window.scrollTo({ top: 0, behavior: 'instant' });
        updateWalinePath('/');
      }

      /* ---- Markdown 渲染（marked.js + highlight.js） ---- */
      marked.setOptions({
        highlight: function (code, lang) {
          if (lang && hljs.getLanguage(lang)) {
            try {
              return hljs.highlight(code, { language: lang }).value;
            } catch (e) { /* fall through */ }
          }
          return code;
        },
        breaks: true,
        gfm: true
      });

      function formatMarkdownText(text) {
        return marked.parse(text);
      }

      /* ---- 灯箱 ---- */
      function openLightbox(src) {
        var existing = document.querySelector('.lightbox');
        if (existing) existing.remove();

        var overlay = document.createElement('div');
        overlay.className = 'lightbox';

        var img = document.createElement('img');
        img.className = 'lightbox__img';
        img.src = src;
        img.alt = '查看大图';

        var closeBtn = document.createElement('button');
        closeBtn.className = 'lightbox__close';
        closeBtn.textContent = '✕';

        overlay.appendChild(img);
        overlay.appendChild(closeBtn);
        document.body.appendChild(overlay);

        function close() {
          overlay.remove();
          document.removeEventListener('keydown', onKey);
        }

        overlay.addEventListener('click', function (e) {
          if (e.target === overlay || e.target === closeBtn) close();
        });

        function onKey(e) {
          if (e.key === 'Escape') close();
        }
        document.addEventListener('keydown', onKey);
      }

      /* ===========================================================
         工具函数：HTML 转义
         =========================================================== */
      function esc(str) {
        var div = document.createElement('div');
        div.appendChild(document.createTextNode(str || ''));
        return div.innerHTML;
      }

      /* ===========================================================
         前端路由
         =========================================================== */
      function getQueryParam(name) {
        var url = window.location.search;
        var params = new URLSearchParams(url);
        return params.get(name);
      }

      function navigateToPost(postId) {
        currentSPAPage = 'article';
        history.pushState({ page: 'article', postId: postId }, '', '/?p=' + postId);
        showArticleDetail(postId);
      }

      function navigateHome() {
        currentSPAPage = 'home';
        history.pushState({ page: 'home' }, '', window.location.pathname);
        showArticleList();
      }

      window.addEventListener('popstate', function (e) {
        if (e.state && e.state.page === 'about') {
          currentSPAPage = 'about';
          showAboutPage();
        } else if (e.state && e.state.page === 'article' && e.state.postId) {
          currentSPAPage = 'article';
          showArticleDetail(e.state.postId);
        } else {
          currentSPAPage = 'home';
          showArticleList();
        }
      });

      loadPosts();

      var routeParam = getQueryParam('p');
      if (routeParam) {
        navigateToPost(routeParam);
      } else if (window.location.hash === '#about') {
        showAboutPage();
      }

      /* ===========================================================
         Waline 留言板初始化
         =========================================================== */
      import('https://unpkg.com/@waline/client@v2/dist/waline.mjs').then(function (mod) {
        walineInstance = mod.init({
          el: '#waline',
          serverURL: 'https://bxl.vercel.app',
          dark: 'auto',
          reaction: true,
          login: 'disable',
          requiredMeta: ['nick'],
          pageview: true,
          placeholder: '在这里留下你的足迹吧...'
        });
        if (pendingWalinePath && walineInstance.update) {
          walineInstance.update({ path: pendingWalinePath });
          pendingWalinePath = null;
        }

        fetch('https://bxl.vercel.app/article?path=/&type=time')
          .then(function (r) { return r.text(); })
          .then(function (d) {
            var pv = parseInt(d, 10) || 0;
            var el = document.getElementById('site-pv');
            if (el) { el.textContent = pv; }
          })
          .catch(function () {});
      }).catch(function (err) {
        console.warn('Waline 加载失败:', err);
      });
    })();
  </script>
</body>
</html>
